# Drift Check — minimal run against test-run-001 (reconstruct in segment mode)
# Run: bun evaluation/reconstruct_persona.ts evaluation/configs/drift-check.yaml
# Required env: LLM_API_KEY, LLM_BASE_URL
dataset_dir: "test-run-001"

reconstructor:
  model: "google/gemma-4-31b-it:free"

comparators:
  - model: "google/gemma-4-31b-it:free"

segments: 2

fields:
  - personalityTraits
  - speechPatterns
